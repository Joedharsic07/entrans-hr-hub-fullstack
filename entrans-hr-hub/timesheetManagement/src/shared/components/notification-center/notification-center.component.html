<div class="relative">
  <!-- Bell Icon -->
  <button (click)="toggleDropdown()" aria-label="Notifications" class="relative p-2 text-gray-500 hover:text-indigo-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-full">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
    </svg>
    <!-- Badge -->
    <span *ngIf="unreadCount > 0" class="absolute top-1.5 right-1.5 flex h-3 w-3">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500 border-2 border-white"></span>
    </span>
  </button>

  <!-- Dropdown -->
  <div *ngIf="isOpen" class="origin-top-right absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-xl ring-1 ring-black ring-opacity-5 focus:outline-none z-50 transform opacity-100 scale-100 transition ease-out duration-200">
    <!-- Header -->
    <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 rounded-t-2xl">
      <h3 class="text-sm font-semibold text-gray-900">Notifications</h3>
      <button *ngIf="unreadCount > 0" (click)="markAllAsRead()" class="text-xs font-medium text-indigo-600 hover:text-indigo-800">
        Mark all as read
      </button>
    </div>

    <!-- List -->
    <div class="max-h-96 overflow-y-auto divide-y divide-gray-100">
      <div *ngIf="notifications.length === 0" class="px-4 py-8 text-center text-sm text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        You're all caught up!
      </div>
      
      <div *ngFor="let note of notifications" 
           (click)="!note.is_read ? markAsRead(note.id) : null"
           class="px-4 py-3 hover:bg-gray-50 transition-colors duration-150 cursor-pointer relative group"
           [ngClass]="{'bg-indigo-50/30': !note.is_read}">
        
        <div class="flex items-start">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900" [ngClass]="{'font-semibold': !note.is_read}">
              {{note.title}}
            </p>
            <p class="text-sm text-gray-500 truncate mt-0.5">
              {{note.message}}
            </p>
            <p class="text-xs text-gray-400 mt-1">
              {{note.created_at | date:'short'}}
            </p>
          </div>
          
          <button (click)="deleteNotification(note.id, $event)" class="ml-2 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="px-4 py-3 border-t border-gray-100 text-center bg-gray-50/50 rounded-b-2xl">
      <a href="#" class="text-xs font-medium text-indigo-600 hover:text-indigo-800">View all notifications</a>
    </div>
  </div>
</div>
