<div class="min-h-screen bg-slate-50 flex flex-col font-sans antialiased text-slate-800 relative overflow-hidden">

  <!-- Decorative background elements -->
  <div
    class="absolute top-0 left-0 right-0 h-96 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none origin-top blur-3xl transform scale-150">
  </div>

  <!-- Header Logo -->
  <div class="relative z-10 pt-8 px-8 sm:px-12 flex items-center gap-3">
    <img src="/assets/svg/Rectangle 90.svg" alt="Entrans Logo" class="h-10 w-auto" />
    <div class="h-6 w-px bg-slate-300"></div>
    <span class="text-slate-600 font-semibold text-sm tracking-wide uppercase">HR Hub Elite</span>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center p-6 relative z-10 w-full max-w-6xl mx-auto py-12">

    <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">

      <!-- Left Column: Form -->
      <div class="flex flex-col items-center lg:items-start max-w-md mx-auto lg:mx-0 lg:ml-auto w-full">

        <div class="w-full">
          <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-900 tracking-tight mb-2">Reset Password</h1>
          <p class="text-slate-500 text-lg mb-8">Enter your email address to receive a secure reset link.</p>

          <div
            class="bg-white rounded-2xl shadow-lg border border-slate-200/60 p-8 sm:p-10 w-full relative overflow-hidden">
            <!-- decorative accent line -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-primary"></div>

            <div class="mb-6">
              <h2 class="text-xl font-bold text-slate-800">Account Recovery</h2>
            </div>

            <div *ngIf="message"
              class="bg-green-50 text-green-700 border border-green-200 rounded-lg p-3 mb-5 text-sm font-semibold flex items-center gap-2">
              <i class="bi bi-check-circle-fill text-lg"></i>
              {{ message }}
            </div>

            <div *ngIf="error"
              class="bg-red-50 text-red-700 border border-red-200 rounded-lg p-3 mb-5 text-sm font-semibold flex items-center gap-2">
              <i class="bi bi-exclamation-circle-fill text-lg"></i>
              {{ error }}
            </div>

            <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-4">

              <!-- Email Field -->
              <div>
                <label for="email" class="block text-sm font-semibold text-slate-600 mb-1.5">Email Address</label>
                <input type="email" id="email" formControlName="email"
                  class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-slate-800 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none leading-relaxed"
                  placeholder="name@company.com" />
                <div class="mt-1" *ngIf="submitted && forgotPasswordForm.get('email')?.invalid">
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Email is required.
                  </small>
                  <small class="text-red-500 font-semibold text-xs flex items-center gap-1 mt-1"
                    *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    Invalid email format.
                  </small>
                </div>
              </div>

              <!-- Submit Button -->
              <div class="pt-2">
                <button type="submit" [disabled]="loading"
                  class="w-full bg-primary hover:bg-primary-hover disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-4 focus:ring-primary/20">
                  <span *ngIf="!loading">Send Reset Link</span>
                  <span *ngIf="loading" class="flex items-center gap-2">
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                      fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                      </path>
                    </svg>
                    Sending...
                  </span>
                </button>
              </div>

            </form>

            <div class="mt-6 pt-5 border-t border-slate-200/60 text-center">
              <a routerLink="/login"
                class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-primary transition-colors focus:outline-none">
                <i class="bi bi-arrow-left"></i>
                Back to Login
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Illustration -->
      <div class="hidden lg:flex justify-center items-center w-full h-full pb-10">
        <div class="relative w-full max-w-lg aspect-square">
          <!-- Soft glowing backdrop for illustration -->
          <div
            class="absolute inset-0 bg-slate-200/50 rounded-full transform -rotate-12 scale-105 opacity-50">
          </div>
          <img src="/assets/loginLogo.png" alt="Reset Password Illustration"
            class="relative z-10 w-full h-full object-contain drop-shadow-xl filter brightness-105" />
        </div>
      </div>

    </div>
  </div>
</div>
