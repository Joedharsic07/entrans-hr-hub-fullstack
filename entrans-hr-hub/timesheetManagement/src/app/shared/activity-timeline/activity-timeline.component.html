<div class="flow-root max-h-[350px] overflow-y-auto overflow-x-hidden pr-2 custom-scrollbar">
  <div *ngIf="isLoading" class="flex justify-center py-8">
    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-600"></div>
  </div>
  
  <ul *ngIf="!isLoading && activities.length > 0" role="list" class="pb-2">
    <li *ngFor="let activity of activities; let isLast = last">
      <div class="relative pb-8">
        <span *ngIf="!isLast" class="absolute top-4 left-4 -ml-px h-full w-0.5 bg-gray-200" aria-hidden="true"></span>
        <div class="relative flex space-x-3">
          
          <!-- Icon variants based on action -->
          <div>
            <span class="h-8 w-8 rounded-full flex items-center justify-center ring-8 ring-white"
                  [ngClass]="{
                    'bg-green-500': getIconForAction(activity.action) === 'login',
                    'bg-gray-400': getIconForAction(activity.action) === 'logout',
                    'bg-indigo-500': getIconForAction(activity.action) === 'clock',
                    'bg-amber-500': getIconForAction(activity.action) === 'calendar',
                    'bg-blue-500': getIconForAction(activity.action) === 'default'
                  }">
              
              <svg *ngIf="getIconForAction(activity.action) === 'login'" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
              
              <svg *ngIf="getIconForAction(activity.action) === 'logout'" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              
              <svg *ngIf="getIconForAction(activity.action) === 'clock'" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>

              <svg *ngIf="getIconForAction(activity.action) === 'calendar'" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              
              <svg *ngIf="getIconForAction(activity.action) === 'default'" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </span>
          </div>
          
          <div class="flex min-w-0 flex-1 flex-col pt-1.5">
            <div>
              <p class="text-sm text-gray-500">
                <span class="font-medium text-gray-900">{{activity.action}}</span>
                <span *ngIf="activity.status === 'failed'" class="ml-2 inline-flex items-center rounded-full bg-red-100 px-2 py-0.5 text-xs font-medium text-red-800">Failed</span>
              </p>
            </div>
            <div class="mt-0.5 text-sm text-gray-400">
              <time [attr.datetime]="activity.timestamp">{{activity.timestamp | date:'short'}}</time>
            </div>
          </div>
        </div>
      </div>
    </li>
  </ul>
  
  <div *ngIf="!isLoading && activities.length === 0" class="text-center py-8 text-sm text-gray-500 bg-gray-50 rounded-xl border border-dashed border-gray-200">
    No recent activity found.
  </div>
</div>
