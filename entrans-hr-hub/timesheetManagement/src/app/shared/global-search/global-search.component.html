<!-- Search Trigger Button -->
<button (click)="openSearch()" class="flex items-center text-sm leading-6 text-gray-400 bg-gray-100/50 ring-1 ring-gray-900/10 shadow-sm py-1.5 pl-2 pr-3 hover:ring-gray-300 transition-all rounded-lg">
  <svg width="24" height="24" fill="none" aria-hidden="true" class="mr-3 flex-none"><path d="m19 19-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></circle></svg>
  Quick search...
  <span class="ml-auto pl-3 flex-none text-xs font-semibold">Ctrl K</span>
</button>

<!-- Search Modal overlay -->
<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-start justify-center pt-16 sm:pt-24 p-4">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity" (click)="closeSearch()"></div>
  
  <!-- Dialog -->
  <div class="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden ring-1 ring-black/5 flex flex-col transform transition-all">
    <!-- Search Input Area -->
    <div class="flex items-center px-4 border-b border-gray-100">
      <svg class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input 
        #searchInput
        [(ngModel)]="searchQuery" 
        (input)="onSearchChange($event)"
        class="flex-1 w-full h-14 bg-transparent border-0 text-gray-900 placeholder-gray-400 focus:ring-0 sm:text-sm pl-4"
        placeholder="Search for employees, projects, leaves..."
      >
      <button *ngIf="searchQuery" (click)="searchQuery = ''; results = []" class="text-gray-400 hover:text-gray-600 p-1 rounded-md">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Results Area -->
    <div class="max-h-96 overflow-y-auto p-4" *ngIf="searchQuery">
      
      <!-- Loading State -->
      <div *ngIf="isLoading" class="py-14 flex justify-center">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
      </div>

      <!-- Results List -->
      <ul *ngIf="!isLoading && results.length > 0" class="space-y-2">
        <li *ngFor="let result of results" 
            (click)="navigateToResult(result)"
            class="flex items-center px-4 py-3 bg-white hover:bg-indigo-50/50 rounded-xl cursor-pointer transition-colors group">
          <div class="flex h-10 w-10 flex-none items-center justify-center rounded-lg bg-gray-100 group-hover:bg-white border border-gray-200 group-hover:border-indigo-100 shadow-sm transition-colors">
            <svg *ngIf="result.type === 'employee'" class="h-5 w-5 text-gray-500 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <svg *ngIf="result.type === 'project'" class="h-5 w-5 text-gray-500 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
            <svg *ngIf="result.type === 'leave'" class="h-5 w-5 text-gray-500 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </div>
          <div class="ml-4 flex-auto">
            <p class="text-sm font-medium text-gray-900 group-hover:text-indigo-700">{{result.title}}</p>
            <p class="text-xs text-gray-500">{{result.subtitle}}</p>
          </div>
          <div class="ml-4 flex-none text-gray-400 group-hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </li>
      </ul>

      <!-- Empty State -->
      <div *ngIf="!isLoading && results.length === 0" class="py-14 text-center px-4">
        <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h3 class="mt-4 text-sm font-semibold text-gray-900">No results found</h3>
        <p class="mt-1 text-sm text-gray-500">We couldn't find anything matching "{{searchQuery}}". Try adjusting your search.</p>
      </div>
    </div>
    
    <!-- Footer Helpers -->
    <div class="bg-gray-50 px-4 py-3 flex items-center justify-between border-t border-gray-100 rounded-b-2xl text-xs text-gray-500">
      <span class="flex items-center gap-1">Search powered by Entrans Hub</span>
      <span class="flex items-center gap-1">Press <kbd class="px-1.5 py-0.5 rounded-md bg-white border border-gray-200 font-mono shadow-sm">ESC</kbd> to close</span>
    </div>
  </div>
</div>
