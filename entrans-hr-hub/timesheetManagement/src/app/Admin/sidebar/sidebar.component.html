<div class="flex h-full fixed pointer-events-none">
  <!-- Sidebar -->
  <aside [class.hidden]="sidebarHidden" [class.w-20]="sidebarHidden" [class.w-72]="!sidebarHidden"
    class="bg-[#1e40af] text-white transition-all duration-300 flex flex-col shadow-xl border-r border-blue-700/30 h-screen z-50 overflow-y-auto overflow-x-hidden pointer-events-auto">

    <!-- Logo Area Top -->
    <div class="h-20 flex items-center border-b border-white/10 sticky top-0 bg-[#1e40af] z-10 shrink-0"
      [ngClass]="{'px-6 justify-start': !sidebarHidden, 'justify-center': sidebarHidden}">
      <div
        class="w-10 h-10 rounded-xl bg-white text-[#1e40af] flex items-center justify-center shadow-md font-extrabold text-lg shrink-0">
        HR
      </div>
      <div *ngIf="!sidebarHidden" class="ml-3 flex flex-col">
        <span class="font-extrabold text-white text-lg tracking-tight leading-none">HR Hub</span>
        <span class="text-white/50 text-[10px] font-bold uppercase tracking-widest mt-0.5">Elite Edition</span>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex flex-col w-full py-5 px-3 gap-1.5 flex-1">

      <!-- Dashboard -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/admin" routerLinkActive="sidebar-active" [routerLinkActiveOptions]="{exact: true}"
          class="sidebar-nav-link" [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-grid-1x2-fill sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Dashboard</span>
        </a>
      </div>

      <!-- My Profile -->
      <div class="group">
        <a routerLink="/user-profile" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-person-circle sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">My Profile</span>
        </a>
      </div>

      <!-- Attendance -->
      <div class="group">
        <a routerLink="/attendance" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-clock-history sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Attendance</span>
        </a>
      </div>

      <!-- Leaves -->
      <div class="group">
        <a routerLink="/leaves" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-calendar2-x sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Leaves</span>
        </a>
      </div>

      <!-- Timesheet Tools with dropdown -->
      <div *ngIf="isAdmin" class="group">
        <div class="relative">
          <button (click)="toggleTimesheetDropdown()" class="sidebar-nav-link w-full"
            [ngClass]="{'justify-center': sidebarHidden, 'sidebar-active': showTimesheetDropdown && !sidebarHidden}">
            <i class="bi bi-calendar-range sidebar-nav-icon"></i>
            <span class="sidebar-nav-text flex-1 text-left" *ngIf="!sidebarHidden">Timesheet Tools</span>
            <i *ngIf="!sidebarHidden" class="bi text-[10px] transition-transform ml-auto"
              [ngClass]="showTimesheetDropdown ? 'bi-chevron-up text-white' : 'bi-chevron-down text-white/40'"></i>
          </button>

          <!-- Dropdown items -->
          <div *ngIf="!sidebarHidden && showTimesheetDropdown"
            class="ml-4 mt-1.5 mb-1.5 pl-3 border-l-2 border-white/15 space-y-1">
            <a routerLink="/timesheet" routerLinkActive="text-white bg-white/20 font-bold" class="sidebar-sub-link">
              <i class="bi bi-cloud-arrow-up text-sm mr-2.5"></i>
              <span>Upload Automation</span>
            </a>
            <a routerLink="/validation-timesheet" routerLinkActive="text-white bg-white/20 font-bold"
              class="sidebar-sub-link">
              <i class="bi bi-clipboard-check text-sm mr-2.5"></i>
              <span>Manual Validation</span>
            </a>
          </div>
        </div>
      </div>

      <!-- Anniversary Slides -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/ppt-automation" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-file-earmark-slides sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Anniversary Slides</span>
        </a>
      </div>

      <!-- Create Project -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/create-project" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-folder-plus sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Create Project</span>
        </a>
      </div>

      <!-- Project Members -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/project-members" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-people-fill sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Project Members</span>
        </a>
      </div>

      <!-- User List -->
      <div *ngIf="isAdmin" class="group">
        <a routerLink="/user-list" routerLinkActive="sidebar-active" class="sidebar-nav-link"
          [ngClass]="{'justify-center': sidebarHidden}">
          <i class="bi bi-people sidebar-nav-icon"></i>
          <span *ngIf="!sidebarHidden" class="sidebar-nav-text">User List</span>
        </a>
      </div>

    </div>

    <!-- Bottom section -->
    <div class="mt-auto border-t border-white/10 px-3 py-3 shrink-0 space-y-1.5">
      <a class="sidebar-nav-link" [ngClass]="{'justify-center': sidebarHidden}">
        <i class="bi bi-question-circle sidebar-nav-icon"></i>
        <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Help</span>
      </a>
      <a class="sidebar-nav-link" [ngClass]="{'justify-center': sidebarHidden}">
        <i class="bi bi-headset sidebar-nav-icon"></i>
        <span *ngIf="!sidebarHidden" class="sidebar-nav-text">Support</span>
      </a>
      <div class="flex items-center justify-center mt-2 mb-1" *ngIf="!sidebarHidden">
        <span class="sidebar-version-badge">V2.0 ELITE EDITION</span>
      </div>
    </div>
  </aside>

  <!-- Router Outlet Wrapper -->
  <div class="flex-1 w-full ml-0 transition-all duration-300 pointer-events-none"
    [ngClass]="{'ml-20': sidebarHidden, 'ml-72': !sidebarHidden}">
    <router-outlet></router-outlet>
  </div>
</div>

<!-- ===== Change Password Modal ===== -->
<div *ngIf="showChangePasswordModal"
  class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4"
  (click)="closeChangePassword()">

  <div class="card !p-0 w-full max-w-md overflow-hidden" (click)="$event.stopPropagation()">

    <!-- Modal Header -->
    <div class="flex justify-between items-center px-6 py-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary/10 flex items-center justify-center">
          <i class="bi bi-shield-lock text-primary text-base"></i>
        </div>
        <h2 class="card-title">Change Password</h2>
      </div>
      <button (click)="closeChangePassword()"
        class="text-slate-700 hover:text-slate-900 hover:bg-slate-100 p-2 rounded-full transition-colors focus:outline-none">
        <i class="bi bi-x-lg text-sm text-slate-800"></i>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6">

      <!-- Success -->
      <div *ngIf="cpSuccess"
        class="flex items-start gap-3 bg-green-50 border border-green-200 text-green-800 rounded-xl p-3 mb-5 text-sm">
        <i class="bi bi-check-circle-fill text-green-500 mt-0.5"></i>
        <span>{{ cpSuccess }}</span>
      </div>

      <!-- Error -->
      <div *ngIf="cpError"
        class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 rounded-xl p-3 mb-5 text-sm">
        <i class="bi bi-exclamation-circle-fill text-red-500 mt-0.5"></i>
        <span>{{ cpError }}</span>
      </div>

      <form (ngSubmit)="submitChangePassword()" class="space-y-4">

        <!-- Current Password -->
        <div>
          <label class="label-text">Current Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.old_password" name="old_password" [type]="showOldPwd ? 'text' : 'password'"
              placeholder="Enter current password" class="form-input pr-10" />
            <button type="button" (click)="showOldPwd = !showOldPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showOldPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- New Password -->
        <div>
          <label class="label-text">New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.new_password" name="new_password" [type]="showNewPwd ? 'text' : 'password'"
              placeholder="Minimum 8 characters" class="form-input pr-10" />
            <button type="button" (click)="showNewPwd = !showNewPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showNewPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Confirm New Password -->
        <div>
          <label class="label-text">Confirm New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.confirm_password" name="confirm_password"
              [type]="showConfirmPwd ? 'text' : 'password'" placeholder="Repeat new password"
              class="form-input pr-10" />
            <button type="button" (click)="showConfirmPwd = !showConfirmPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showConfirmPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button type="button" (click)="closeChangePassword()" class="btn btn-secondary flex-1">
            Cancel
          </button>
          <button type="submit" [disabled]="cpLoading" class="btn btn-primary flex-1">
            <span *ngIf="cpLoading"
              class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            <span>{{ cpLoading ? 'Saving...' : 'Change Password' }}</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
