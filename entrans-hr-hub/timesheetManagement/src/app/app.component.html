<div class="h-screen flex flex-col font-sans antialiased text-slate-800">

  <!-- ===== Top Navigation Bar ===== -->
  <header *ngIf="shouldShowNavbar()" class="app-header">
    <!-- Left Section: Logo + Brand + Nav Tabs + Search -->
    <div class="header-left">
      <button class="md:hidden header-mobile-btn" (click)="toggleMobileSidebar()">
        <i class="bi bi-list text-2xl leading-none"></i>
      </button>

      <!-- Logo -->
      <img src="/assets/svg/Rectangle 90.svg" alt="Entrans Logo" class="header-logo">

      <!-- Brand -->
      <span class="header-brand">HR HUB ELITE</span>

      <!-- Nav Tabs -->
      <nav class="header-nav">
        <a routerLink="/admin" routerLinkActive="header-nav-link--active" [routerLinkActiveOptions]="{exact: true}"
          class="header-nav-link">Dashboard</a>
        <a routerLink="/validation-timesheet" routerLinkActive="header-nav-link--active"
          class="header-nav-link">Reports</a>
        <a class="header-nav-link">Settings</a>
      </nav>

      <!-- Search -->
      <div class="header-search">
        <i class="bi bi-search header-search-icon"></i>
        <input type="text" placeholder="Search..." class="header-search-input" />
      </div>
    </div>

    <!-- Right Section: Notification + User + Logout -->
    <div class="header-right">
      <!-- Notification Bell -->
      <button class="header-icon-btn">
        <i class="bi bi-bell"></i>
      </button>

      <!-- User Info -->
      <div class="header-user">
        <div class="header-user-avatar">
          {{ userName ? userName.charAt(0).toUpperCase() : 'A' }}
        </div>
        <div class="header-user-info">
          <span class="header-user-name">{{ userName }}</span>
          <span class="header-user-role">{{ userRole }}</span>
        </div>
      </div>

      <!-- Settings -->
      <div class="relative" (click)="$event.stopPropagation()">
        <button class="header-icon-btn" (click)="toggleSettings()">
          <i class="bi bi-gear"></i>
        </button>
        <div *ngIf="showSettingsDropdown"
          class="absolute right-0 top-full mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden z-50">
          <button (click)="openChangePassword()"
            class="w-full flex items-center gap-3 px-4 py-3 text-slate-700 hover:bg-slate-50 text-sm font-semibold transition-colors focus:outline-none">
            <i class="bi bi-shield-lock text-slate-500"></i>
            Change Password
          </button>
        </div>
      </div>

      <!-- Logout -->
      <button class="header-logout-btn" (click)="logout()">
        Logout
      </button>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <main
    [ngClass]="shouldShowNavbar() ? 'flex-1 overflow-auto bg-slate-50 pt-16 min-h-[calc(100vh-4rem)]' : 'flex-1 overflow-auto bg-slate-50 min-h-screen'">
    <router-outlet></router-outlet>
  </main>

  <!-- ===== Mobile Sidebar Overlay ===== -->
  <div *ngIf="showMobileSidebar" class="md:hidden fixed inset-0 z-[100] flex">
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity" (click)="toggleMobileSidebar()">
    </div>
    <div class="relative w-72 bg-white h-full shadow-2xl transform transition-transform anim-slide-right flex-shrink-0">
      <app-sidebar></app-sidebar>
    </div>
  </div>
</div>

<!-- ===== Change Password Modal ===== -->
<div *ngIf="showChangePwdModal"
  class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[300] p-4"
  (click)="closeChangePassword()">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md border border-slate-200 overflow-hidden"
    (click)="$event.stopPropagation()">

    <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
          <i class="bi bi-shield-lock text-primary text-sm"></i>
        </div>
        <h2 class="text-base font-bold text-slate-800">Change Password</h2>
      </div>
      <button (click)="closeChangePassword()"
        class="text-slate-700 hover:text-slate-900 hover:bg-slate-100 p-1.5 rounded-full transition-colors focus:outline-none">
        <i class="bi bi-x-lg text-sm text-slate-800"></i>
      </button>
    </div>

    <div class="p-5">
      <div *ngIf="cpSuccess"
        class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-800 rounded-xl p-3 mb-4 text-sm">
        <i class="bi bi-check-circle-fill text-green-500"></i>
        <span>{{ cpSuccess }}</span>
      </div>
      <div *ngIf="cpError"
        class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-800 rounded-xl p-3 mb-4 text-sm">
        <i class="bi bi-exclamation-circle-fill text-red-500"></i>
        <span>{{ cpError }}</span>
      </div>

      <form (ngSubmit)="submitChangePassword()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Current Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.old_password" name="old_password" [type]="showOldPwd ? 'text' : 'password'"
              placeholder="Enter current password"
              class="w-full px-4 py-2.5 pr-10 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all text-sm" />
            <button type="button" (click)="showOldPwd = !showOldPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showOldPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.new_password" name="new_password" [type]="showNewPwd ? 'text' : 'password'"
              placeholder="Minimum 8 characters"
              class="w-full px-4 py-2.5 pr-10 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all text-sm" />
            <button type="button" (click)="showNewPwd = !showNewPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showNewPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm New Password</label>
          <div class="relative">
            <input [(ngModel)]="cpForm.confirm_password" name="confirm_password"
              [type]="showConfirmPwd ? 'text' : 'password'" placeholder="Repeat new password"
              class="w-full px-4 py-2.5 pr-10 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all text-sm" />
            <button type="button" (click)="showConfirmPwd = !showConfirmPwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-700 hover:text-slate-900 focus:outline-none">
              <i [class]="showConfirmPwd ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
            </button>
          </div>
        </div>
        <div class="flex gap-3 pt-1">
          <button type="button" (click)="closeChangePassword()"
            class="flex-1 py-2.5 rounded-xl font-semibold text-sm hover:bg-slate-100 transition-colors focus:outline-none"
            style="border: 1.5px solid #e2e8f0; color: #334155; background: #fff;">Cancel</button>
          <button type="submit" [disabled]="cpLoading"
            class="flex-1 py-2.5 rounded-xl bg-primary text-white font-semibold text-sm hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-2">
            <span *ngIf="cpLoading"
              class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            <span>{{ cpLoading ? 'Saving...' : 'Change Password' }}</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
